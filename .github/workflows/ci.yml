name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: novapost
          POSTGRES_PASSWORD: novapost
          POSTGRES_DB: novapostbot_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U novapost -d novapostbot_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_test
      DATABASE_URL_DIRECT: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_test
      FERNET_KEY: 8LriREApni0MjqknuIDohQH6rnNVIOknKJ6Kl4tuVQ4=
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest -q

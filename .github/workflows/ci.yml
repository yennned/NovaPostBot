name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: novapost
          POSTGRES_PASSWORD: novapost
          POSTGRES_DB: novapostbot_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U novapost -d novapostbot_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_test
      DATABASE_URL_DIRECT: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_test
      FERNET_KEY: 8LriREApni0MjqknuIDohQH6rnNVIOknKJ6Kl4tuVQ4=
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Layer boundary (no aiogram in services/db)
        run: |
          if grep -rnE "^(import aiogram|from aiogram)" app/services app/db; then
            echo "::error::app/services и app/db не должны импортировать aiogram (API-first слой)"
            exit 1
          fi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Compileall
        run: python -m compileall -q app tests scripts

      - name: Pytest
        run: python -m pytest -q

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: novapost
          POSTGRES_PASSWORD: novapost
          POSTGRES_DB: novapostbot_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U novapost -d novapostbot_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_test
      DATABASE_URL_DIRECT: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_test
      FERNET_KEY: 8LriREApni0MjqknuIDohQH6rnNVIOknKJ6Kl4tuVQ4=
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Layer boundary (no aiogram in services/db)
        run: |
          if grep -rnE "^(import aiogram|from aiogram)" app/services app/db; then
            echo "::error::app/services и app/db не должны импортировать aiogram (API-first слой)"
            exit 1
          fi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Compileall
        run: python -m compileall -q app tests scripts

      - name: Pytest
        run: python -m pytest -q

  migration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: novapost
          POSTGRES_PASSWORD: novapost
          POSTGRES_DB: novapostbot_migrations_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U novapost -d novapostbot_migrations_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_migrations_test
      DATABASE_URL_DIRECT: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_migrations_test
      FERNET_KEY: 8LriREApni0MjqknuIDohQH6rnNVIOknKJ6Kl4tuVQ4=
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Alembic upgrade from empty database
        run: python -m alembic upgrade head

      # Пустая база не ловит бэкофиллы: осиротевших строк в ней нет по определению.
      # Прогоняем ещё раз поверх легаси-данных — бывший клиент, повышенный до
      # внутренней роли, но с оставшимися от него строками. Именно на таком входе
      # бэкофилл account_id ронял прод-деплой (NOT NULL abort всей транзакции).
      - name: Alembic upgrade over legacy data
        env:
          PGPASSWORD: novapost
        run: |
          set -euo pipefail
          psql -h localhost -U novapost -d novapostbot_migrations_test -v ON_ERROR_STOP=1 \
            -c "drop schema public cascade; create schema public;"
          python -m alembic upgrade a1b2c3d4e5f6
          psql -h localhost -U novapost -d novapostbot_migrations_test -v ON_ERROR_STOP=1 <<'SQL'
          insert into users (id, telegram_id, phone, full_name, role, status, permissions, created_at, updated_at)
          values ('11111111-1111-1111-1111-111111111111', 999001, '380670000001', 'Був клієнт',
                  'manager', 'active', '{}', now(), now());
          insert into sender_profiles (id, client_id, name, np_api_key, org_type, is_default, created_at, updated_at)
          values ('22222222-2222-2222-2222-222222222222', '11111111-1111-1111-1111-111111111111',
                  'ФОП', 'enc', 'fop', true, now(), now());
          SQL
          python -m alembic upgrade head
          psql -h localhost -U novapost -d novapostbot_migrations_test -v ON_ERROR_STOP=1 \
            -c "do \$\$ begin if (select count(*) from sender_profiles where account_id is null) > 0
                then raise exception 'backfill left orphaned account_id rows'; end if; end \$\$;"

  # CD: только при push в main и после зелёных lint/test и migration-smoke.
  # Образ всегда публикуется в GHCR (git sha + latest); деплой по SSH — лишь если
  # заданы секреты сервера (иначе шаг мягко скипается, первый merge не падает).
  deploy:
    needs: [lint-test, migration-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - name: Compute image ref
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # buildx с драйвером docker-container — иначе GHA-кэш (cache-to: type=gha) не
      # поддерживается дефолтным docker-драйвером.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        if: ${{ env.SSH_HOST != '' }}
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          # APP_IMAGE (ghcr…:latest) задан в .env на сервере; порядок migrate→bot→worker
          # держит depends_on. --no-build: используем подтянутый образ, не собираем на VPS.
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '~/NovaPostBot' }}
            docker compose pull
            if ! docker compose up -d --no-build; then
              docker compose ps
              docker compose logs --no-color --tail=200 migrate bot worker
              exit 1
            fi
            if ! docker compose ps --status running --services | grep -Eq '(^| )bot( |$)'; then
              docker compose ps
              docker compose logs --no-color --tail=200 migrate bot worker
              exit 1
            fi
            if ! docker compose ps --status running --services | grep -Eq '(^| )worker( |$)'; then
              docker compose ps
              docker compose logs --no-color --tail=200 migrate bot worker
              exit 1
            fi
            docker compose ps
            docker image prune -f

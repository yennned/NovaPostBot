name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: novapost
          POSTGRES_PASSWORD: novapost
          POSTGRES_DB: novapostbot_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U novapost -d novapostbot_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_test
      DATABASE_URL_DIRECT: postgresql+asyncpg://novapost:novapost@localhost:5432/novapostbot_test
      FERNET_KEY: 8LriREApni0MjqknuIDohQH6rnNVIOknKJ6Kl4tuVQ4=
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Layer boundary (no aiogram in services/db)
        run: |
          if grep -rnE "^(import aiogram|from aiogram)" app/services app/db; then
            echo "::error::app/services и app/db не должны импортировать aiogram (API-first слой)"
            exit 1
          fi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Compileall
        run: python -m compileall -q app tests scripts

      - name: Pytest
        run: python -m pytest -q

  # CD: только при push в main и только после зелёного lint-test.
  # Образ всегда публикуется в GHCR (git sha + latest); деплой по SSH — лишь если
  # заданы секреты сервера (иначе шаг мягко скипается, первый merge не падает).
  deploy:
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Compute image ref
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # buildx с драйвером docker-container — иначе GHA-кэш (cache-to: type=gha) не
      # поддерживается дефолтным docker-драйвером.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        if: ${{ env.SSH_HOST != '' }}
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          # APP_IMAGE (ghcr…:latest) задан в .env на сервере; порядок migrate→bot→worker
          # держит depends_on. --no-build: используем подтянутый образ, не собираем на VPS.
          script: |
            cd ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '~/NovaPostBot' }}
            docker compose pull
            docker compose up -d --no-build
            docker image prune -f

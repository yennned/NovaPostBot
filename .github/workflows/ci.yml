name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Layer boundary (no aiogram in services/db)
        run: |
          if grep -rnE "^(import aiogram|from aiogram)" app/services app/db; then
            echo "::error::app/services и app/db не должны импортировать aiogram (API-first слой)"
            exit 1
          fi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Compileall
        run: python -m compileall -q app tests scripts

      - name: Pytest
        run: >
          python -m pytest
          tests/test_config.py
          tests/test_crypto.py
          tests/test_inventory_summary.py
          tests/test_jobs.py
          tests/test_novaposhta_cache.py
          tests/test_novaposhta_client.py
          tests/test_novaposhta_mapping.py
          tests/test_novaposhta_methods.py
          tests/test_permissions.py
          tests/test_phone.py
          tests/test_sla.py
          tests/test_stock_source.py
          tests/test_work_schedule.py
          tests/bot/test_client_keyboards.py
          tests/bot/test_clients_returns_ui.py
          tests/bot/test_dev_service.py
          tests/bot/test_errors_handler.py
          tests/bot/test_manager_shipments_handlers.py
          tests/bot/test_manager_shipments_ui.py
          tests/bot/test_start_handlers.py
          tests/bot/test_start_service.py
          tests/bot/test_start_smoke.py
          tests/bot/test_ttn_cart.py
          -k "not test_entry_"

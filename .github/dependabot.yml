version: 2
updates:
  # Python-зависимости (requirements.txt + requirements-dev.txt)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: chore

  # Версии GitHub Actions в workflow'ах
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    commit-message:
      prefix: chore

# Прод-Postgres — внешний (managed Neon, см. DATABASE_URL). Локальный `postgres`
# ниже (профиль `dev`) — для autogenerate миграций и прогона тестов без Neon.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles: ["dev"]
    environment:
      POSTGRES_USER: novapost
      POSTGRES_PASSWORD: novapost
      POSTGRES_DB: novapostbot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novapost -d novapostbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    restart: "no"

  bot:
    build: .
    command: ["python", "-m", "app.main"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

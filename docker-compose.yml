# Postgres — внешний (managed Neon, см. DATABASE_URL). Здесь только bot/worker/redis.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    restart: "no"

  bot:
    build: .
    command: ["python", "-m", "app.main"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

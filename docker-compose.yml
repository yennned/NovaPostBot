# Прод-Postgres — внешний (managed Neon, см. DATABASE_URL). Локальный `postgres`
# ниже (профиль `dev`) — для autogenerate миграций и прогона тестов без Neon.

# Общий образ для migrate/bot/worker (один Dockerfile, разные command).
# Локально APP_IMAGE не задан → `build` собирает novapostbot:local (как раньше).
# На проде в .env: APP_IMAGE=ghcr.io/yennned/novapostbot:latest → `docker compose pull`.
x-app: &app
  image: ${APP_IMAGE:-novapostbot:local}
  build: .
  env_file: .env

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles: ["dev"]
    environment:
      POSTGRES_USER: novapost
      POSTGRES_PASSWORD: novapost
      POSTGRES_DB: novapostbot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novapost -d novapostbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    <<: *app
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  bot:
    <<: *app
    command: ["python", "-m", "app.main"]
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    <<: *app
    command: ["python", "-m", "app.worker"]
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
